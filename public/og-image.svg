<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C4A3B"/>
      <stop offset="100%" style="stop-color:#1a3326"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Dark green background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative wave pattern -->
  <path d="M0 500 Q 300 450, 600 500 T 1200 500 L1200 630 L0 630 Z" fill="#3d6350" opacity="0.3"/>
  <path d="M0 540 Q 300 500, 600 540 T 1200 540 L1200 630 L0 630 Z" fill="#4a7a5f" opacity="0.2"/>
  
  <!-- Gold accent line -->
  <rect x="80" y="200" width="80" height="4" fill="#D4A373" rx="2"/>
  
  <!-- River icon (simple wave) -->
  <path d="M100 240 Q 120 230, 140 240 T 180 240" stroke="#D4A373" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Title -->
  <text x="80" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#FDFBF7" filter="url(#shadow)">
    River Kolpa
  </text>
  <text x="80" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="bold" fill="#FDFBF7" filter="url(#shadow)">
    Apartments
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="440" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#F3F1EC" opacity="0.9">
    Premium Vacation Home • Bela krajina, Slovenia
  </text>
  
  <!-- Features -->
  <text x="80" y="510" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#D4A373">
    ★ 9.8/10 on Booking • Sleeps 7 Guests • 500m from the River
  </text>
  
  <!-- Right side decorative elements -->
  <circle cx="1050" cy="150" r="80" fill="#D4A373" opacity="0.1"/>
  <circle cx="1050" cy="150" r="60" fill="#D4A373" opacity="0.15"/>
  <circle cx="1050" cy="150" r="40" fill="#D4A373" opacity="0.2"/>
  
  <!-- Mountain/house silhouette -->
  <path d="M900 350 L1000 250 L1100 350 Z" fill="#3d6350" opacity="0.4"/>
  <rect x="960" y="300" width="80" height="50" fill="#4a7a5f" opacity="0.3"/>
</svg>
